<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mondrian Project</title>
  <style>
   
    body {
      margin: 0;
      padding: 0;
      
    }

    .center{
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .container{
      display: grid;
      width: 748px;
      height: 746px;
      grid-template-columns: 320px 198px 153px 50px;
      grid-template-rows: 414px 130px 155px 20px;
      gap: 9px;
      background-color: #000
    }

    .white{
      background-color: #F0F1EC;
    }

    .white1{
      grid-column: span 3;
    }

    .white2{
      grid-row: span 2;
    }

    .white3{
      grid-column: span 2;
      grid-row: span 2;
    }

    .white4{
      grid-row: span 2;
    }

    .white5{
      grid-row: 4/5;
    }

    .red{
      background-color: #E72F24;
    }

    .black{
      background-color: #232629;
    }

    .blue{
      background-color: #004592;
      border-bottom: solid 10px #000;
    }

    .yellow{
      background-color: #F9D01E;
    }



  </style>
</head>

<body>
   <div class="center">
    <div class="container">
     <div class="red"></div>
     <div class="white white1"></div>
     <div class="white white2"></div>
     <div class="white white3"></div>
     <div class="blue"></div>
     <div class="white white4"></div>
     <div class="yellow"></div>
     <div class="black"></div>
     <div class="white white5"></div>
    </div>
   </div>
</body>

</html>
